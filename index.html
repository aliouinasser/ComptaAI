<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ComptaAI – ATH Consulting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --A:#d97706;--AH:#b45309;--AB:rgba(217,119,6,.1);
  --bg:#f5f4f0;--sf:#fff;--br:rgba(0,0,0,.08);--br2:rgba(0,0,0,.14);
  --tx:#1a1a1a;--mt:#6b7280;--dm:#9ca3af;
  --ok:#10b981;--bad:#ef4444;--inf:#3b82f6;--wn:#f59e0b;
  --okb:rgba(16,185,129,.1);--bdb:rgba(239,68,68,.1);--ifb:rgba(59,130,246,.1);--wnb:rgba(245,158,11,.1);
  --sw:230px;--hh:58px;
}
@media(prefers-color-scheme:dark){:root{--bg:#0f1117;--sf:#1a1d27;--br:rgba(255,255,255,.07);--br2:rgba(255,255,255,.14);--tx:#e8e8e8;--mt:#9ca3af;--dm:#4b5563}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;overflow-x:hidden}

/* LOGIN */
#lk{position:fixed;inset:0;background:#0f1117;z-index:9999;display:flex;align-items:center;justify-content:center}
#lkb{background:#1a1d27;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:40px 36px;width:90%;max-width:380px;text-align:center;transition:transform .1s}
#lkb h2{font-size:22px;font-weight:700;margin-bottom:4px;color:#e8e8e8}
#lkb h2 span{color:#d97706}
#lkb p{font-size:12px;color:#6b7280;margin-bottom:24px}
#lkpw{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.05);color:#e8e8e8;font-size:15px;outline:none;text-align:center;font-family:inherit;margin-bottom:12px}
#lkpw:focus{border-color:#d97706}
#lkbt{width:100%;padding:12px;background:#d97706;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
#lkbt:hover{background:#b45309}
#lkerr{color:#ef4444;font-size:12px;margin-top:8px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sb{width:var(--sw);background:var(--sf);border-right:1px solid var(--br);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;transition:transform .25s}
.sbl{padding:18px 16px 14px;border-bottom:1px solid var(--br)}
.sbl h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sbl h1 span{color:var(--A)}
.sbl p{font-size:11px;color:var(--mt);margin-top:1px}
.nbb{flex:1;overflow-y:auto;padding:6px 0}
.ns{font-size:10px;color:var(--dm);text-transform:uppercase;letter-spacing:.08em;padding:10px 16px 4px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--mt);font-size:13px;border:none;background:none;width:100%;text-align:left;transition:all .12s}
.ni:hover{color:var(--tx);background:var(--bg)}
.ni.on{color:var(--A);background:var(--AB);font-weight:500}
.nico{width:16px;height:16px;flex-shrink:0}
.nft{padding:10px 14px;border-top:1px solid var(--br);font-size:11px;color:var(--dm);display:flex;justify-content:space-between;align-items:center}
#mn{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}
#hd{height:var(--hh);background:var(--sf);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:100;gap:10px}
#ct{padding:20px;flex:1}
#hbg{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--tx);padding:4px}
#ov2{display:none;position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.4)}
#syncstt{font-size:11px;padding:3px 8px;border-radius:20px;display:none}

/* RESPONSIVE MOBILE */
@media(max-width:768px){
  #sb{transform:translateX(-100%)}
  #sb.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.3)}
  #mn{margin-left:0}
  #ct{padding:12px}
  #hbg{display:block}
  #ov2.show{display:block}
  .hide-m{display:none!important}
  .g4{grid-template-columns:1fr 1fr!important}
  .g2{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr 1fr!important}
  .gchart{grid-template-columns:1fr!important}
  .tbl-wrap table{min-width:unset}
  .tbl td,.tbl th{padding:8px 8px!important;font-size:12px!important}
  .modal{padding:16px!important}
  .fgr{grid-template-columns:1fr!important}
  .fg.sp2{grid-column:span 1!important}
}
@media(max-width:480px){
  .g4{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr!important}
}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:20px}
.sc{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:16px}
.sl2{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mt);margin-bottom:6px}
.sv{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums}
.ss{font-size:11px;margin-top:4px;color:var(--mt)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:1px solid var(--br2);cursor:pointer;font-size:13px;background:transparent;color:var(--mt);transition:all .12s;font-family:inherit;white-space:nowrap}
.btn:hover:not(:disabled){background:var(--bg)}
.btn:disabled{opacity:.45;cursor:default}
.bp{background:var(--A)!important;color:#fff!important;border-color:var(--A)!important}
.bp:hover:not(:disabled){background:var(--AH)!important}
.bok{background:var(--ok)!important;color:#fff!important;border-color:var(--ok)!important}
.bbad{border-color:var(--bad)!important;color:var(--bad)!important}
.bbad:hover:not(:disabled){background:var(--bdb)!important}
.bs{padding:5px 10px;font-size:12px}
.bx{padding:3px 7px;font-size:11px}

/* FORMS */
.inp{width:100%;padding:9px 11px;border:1px solid var(--br2);border-radius:8px;background:var(--bg);color:var(--tx);font-size:13px;outline:none;font-family:inherit;transition:border .12s}
.inp:focus{border-color:var(--A)}
select.inp option{background:var(--sf)}
.lbl{display:block;font-size:11px;color:var(--mt);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.sp2{grid-column:span 2}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* TABLES */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--br);font-weight:500;white-space:nowrap}
.tbl td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--br);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.bok2{background:var(--okb);color:var(--ok)}
.bbad2{background:var(--bdb);color:var(--bad)}
.binf{background:var(--ifb);color:var(--inf)}
.bwn{background:var(--wnb);color:var(--wn)}
.bgr{background:var(--bg);color:var(--mt)}

/* MODALS */
.ov3{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--sf);border-radius:14px;padding:22px;width:100%;max-width:620px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mxl{max-width:780px}
.mh{font-size:16px;font-weight:600;margin-bottom:18px}

/* ALERTS */
.al{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.ai{background:var(--ifb);color:var(--inf);border:1px solid rgba(59,130,246,.2)}
.ao{background:var(--okb);color:var(--ok);border:1px solid rgba(16,185,129,.2)}
.ab{background:var(--bdb);color:var(--bad);border:1px solid rgba(239,68,68,.2)}
.aw{background:var(--wnb);color:var(--wn);border:1px solid rgba(245,158,11,.2)}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--br);margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 12px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--mt);border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:all .12s}
.tab.on{color:var(--A);border-bottom-color:var(--A);font-weight:500}

/* CHAT */
.cm{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.cm.u{flex-direction:row-reverse}
.cav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.cav.ai{background:var(--AB);color:var(--A)}
.cav.u{background:var(--bg)}
.cb{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.65;max-width:80%;white-space:pre-wrap;word-break:break-word}
.cb.ai{background:var(--bg)}
.cb.u{background:var(--A);color:#fff;border-radius:12px 12px 4px 12px}

/* PROGRESS */
.pb{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.pbf{height:100%;border-radius:3px;transition:width .4s}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.gchart{display:grid;grid-template-columns:1fr 280px;gap:14px}

/* MISC */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sh-t{font-size:15px;font-weight:600}
.dz{border:2px dashed var(--br2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border .15s}
.dz:hover{border-color:var(--A)}
.ip{background:#fff;color:#1a1a1a;border-radius:8px;padding:28px;font-size:13px;border:1px solid var(--br)}
.empty{text-align:center;padding:32px;color:var(--mt);font-size:13px}
.mono{font-variant-numeric:tabular-nums}
.ok{color:var(--ok)!important}
.bad{color:var(--bad)!important}
.inf{color:var(--inf)!important}
.wn{color:var(--wn)!important}
#tos{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ti{padding:10px 14px;border-radius:9px;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.18);max-width:280px;pointer-events:all}
.tok{background:var(--ok);color:#fff}.tbad{background:var(--bad);color:#fff}.ti2{background:var(--inf);color:#fff}.twa{background:var(--wn);color:#fff}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.dot{width:7px;height:7px;border-radius:50%;background:var(--A);display:inline-block;animation:dp 1.3s ease-in-out infinite}
@media print{#sb,#hd,#tos,.np{display:none!important}#mn{margin-left:0!important}#ct{padding:0!important}}
</style>
</head>

<div id="ov2" onclick="cSB()"></div>
<div id="tos"></div>

</div>

// ════════════════════════════════════════════════════════
// PASSWORD
// ════════════════════════════════════════════════════════
function pwHash(s){return btoa(unescape(encodeURIComponent(s)));}
var PW_HASH=localStorage.getItem('cai_pwh')||pwHash('ComptaAI2026');
function chkPw(){var v=document.getElementById('lkpw').value.trim();if(!v)return;if(pwHash(v)===PW_HASH){sessionStorage.setItem('cai_s','1');document.getElementById('lk').style.display='none';}else{var e=document.getElementById('lkerr');e.textContent='Mot de passe incorrect';document.getElementById('lkpw').value='';var b=document.getElementById('lkb');b.style.animation='shake .4s';setTimeout(function(){b.style.animation='';e.textContent='';},2000);}}
function chgPw(o,n){if(pwHash(o)!==PW_HASH){toast('Ancien mot de passe incorrect','bad');return false;}PW_HASH=pwHash(n);localStorage.setItem('cai_pwh',PW_HASH);sessionStorage.setItem('cai_s','1');toast('Mot de passe modifié !','ok');return true;}
function chkAuth(){if(sessionStorage.getItem('cai_s')==='1')document.getElementById('lk').style.display='none';}
function logout(){sessionStorage.removeItem('cai_s');location.reload();}
chkAuth();

// ── SAVE: localStorage + Google Drive DB sync ──────────
function sv(){
  try{
    var _j=JSON.stringify(S);
    if(!_j||_j.length<50)return;
    // If too large (PDF b64 data), save without PDFs
    if(_j.length>4000000){
      var slim=JSON.parse(_j);
      slim.ii=slim.ii.map(function(i){return {...i,pdfB64:null};});
      slim.io=slim.io.map(function(i){return {...i,pdfB64:null};});
      _j=JSON.stringify(slim);
    }
    localStorage.setItem(SK,_j);
  }catch(e){
    // Quota exceeded: save without PDFs
    try{
      var s2=Object.assign({},S);
      s2.ii=S.ii.map(function(i){return {...i,pdfB64:null};});
      s2.io=S.io.map(function(i){return {...i,pdfB64:null};});
      localStorage.setItem(SK,JSON.stringify(s2));
    }catch(e2){}
  }
  if(S.dv.on&&S.dv.tk){
    if(window._svT)clearTimeout(window._svT);
    window._svT=setTimeout(function(){window._svT=null;if(!_driveDbSaving)syncDriveDB();},4000);
  }
}

// ── DRIVE DB: read/write a JSON file on Drive ──────────
async function syncDriveDB(){
  if(_driveDbSaving)return;_driveDbSaving=true;
  setSyncStatus('saving');
  try{
    var hdr={'Authorization':'Bearer '+S.dv.tk,'Content-Type':'application/json'};
    var data=JSON.stringify(S);
    if(S.dv.dbFid){
      // Update existing file
      var patchR=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+S.dv.dbFid+'?uploadType=media',
        {method:'PATCH',headers:{'Authorization':'Bearer '+S.dv.tk,'Content-Type':'application/json'},body:data});
      if(!patchR.ok){
        if(patchR.status===401){S.dv.on=false;S.dv.tk='';setSyncStatus('err');toast('Drive: session expiree','w');_driveDbSaving=false;return;}
        if(patchR.status===404){S.dv.dbFid='';_driveDbSaving=false;syncDriveDB();return;}
      }
    }else{
      // Create new file
      var meta={name:'comptaai_data.json',mimeType:'application/json'};
      var form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file',new Blob([data],{type:'application/json'}));
      var r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        {method:'POST',headers:{'Authorization':'Bearer '+S.dv.tk},body:form});
      var d=await r.json();
      if(d.id){S.dv.dbFid=d.id;localStorage.setItem(SK,JSON.stringify(S));}
    }
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
  finally{_driveDbSaving=false;}
}
async function loadDriveDB(){
  if(!S.dv.on||!S.dv.tk)return;
  setSyncStatus('loading');
  try{
    var hdr={'Authorization':'Bearer '+S.dv.tk};
    // Find DB file
    var r=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D\'comptaai_data.json\'+and+trashed%3Dfalse&fields=files(id,modifiedTime)&pageSize=1',{headers:hdr});
    var d=await r.json();
    if(d.files&&d.files.length){
      var fid=d.files[0].id;
      var r2=await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',{headers:hdr});
      var remote=await r2.json();
      if(remote&&remote.co){
        var remScore=(remote.io||[]).length+(remote.ii||[]).length+(remote.tx||[]).length;
        var locScore=(S.io||[]).length+(S.ii||[]).length+(S.tx||[]).length;
        if(remScore>=locScore){
          var savedTk=S.dv.tk,savedExp=S.dv.tkExp;
          Object.assign(S,remote);
          S.apiKey=S.apiKey||API_KEY;
          S.dv.cid=S.dv.cid||GD_CLIENT;
          S.dv.dbFid=fid;S.dv.tk=savedTk;S.dv.tkExp=savedExp;S.dv.on=true;
          if(!S.sal)S.sal=[];
if(!S.nII)S.nII=1;
if(!S.audit)S.audit=[];
if(!S.catMemo)S.catMemo={};
          localStorage.setItem(SK,JSON.stringify(S));
          setSyncStatus('ok');
          if(remScore>0)toast('Drive: '+remScore+' elements charges !','ok');
          var cur=document.querySelector('.ni.on');
          var curTab=cur?cur.id.replace('nv-',''):'dash';
          go(curTab);
        }else{
          S.dv.dbFid=fid;setSyncStatus('ok');
          if(locScore>0)syncDriveDB();
        }
        return;
      }
    }
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}
function setSyncStatus(s){
  var el=document.getElementById('syncstt');if(!el)return;
  if(s==='saving'){el.style.display='inline-block';el.className='badge bwn';el.textContent='⟳ Sync...';}
  else if(s==='ok'){el.style.display='inline-block';el.className='badge bok2';el.textContent='✓ Sync';setTimeout(function(){el.style.display='none';},2000);}
  else if(s==='loading'){el.style.display='inline-block';el.className='badge binf';el.textContent='⬇ Sync...';}
  else{el.style.display='inline-block';el.className='badge bbad2';el.textContent='⚠ Sync';}
}

function xle(rows,sh,fn){var wb=XLSX.utils.book_new();var ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=Object.keys(rows[0]||{}).map(function(k){return{wch:Math.max(k.length,14)};});XLSX.utils.book_append_sheet(wb,ws,sh);XLSX.writeFile(wb,fn);toast('Export: '+fn,'ok');}
function byDt(arr){return [...arr].sort(function(a,b){return(a.dt||'').localeCompare(b.dt||'');});}
function xlAll(){
  if(!window.XLSX){toast('SheetJS non charge','bad');return;}
  var wb=XLSX.utils.book_new();
  function addSh(rows,nm2){if(!rows||!rows.length)return;var ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=Object.keys(rows[0]).map(function(k){return{wch:Math.max(k.length+2,14)};});XLSX.utils.book_append_sheet(wb,ws,nm2);}
  addSh(byDt(S.tx).map(function(t,i){return{'#':i+1,Date:t.dt,Type:t.tp==='in'?'Revenu':'Depense',Categorie:t.cat,Description:t.dc,Montant:t.am,'TVA%':t.tv||0,Paiement:t.pm||''};}),'Transactions');
  addSh(byDt(S.io).map(function(v,n){return{'#':n+1,Numero:v.id,Client:v.cl,Date:v.dt,Echeance:v.du||'',Montant:v.am,'TVA%':v.tv||0,Statut:v.st,Devise:v.cu||S.co.cu};}),'Factures emises');
  addSh(byDt(S.ii).map(function(v,n){return{'#':n+1,Numero:v.id,Fournisseur:v.sp,Type:v.itype||'achat',Categorie:v.cat||'',Date:v.dt,Montant:v.am,'TVA%':v.tv||0,Statut:v.st,Valide:v.ok?'Oui':'Non',Paiement:v.pm||'',Devise:v.cu||S.co.cu};}),'Factures recues');
  addSh(byDt(S.sal).map(function(s,i){return{'#':i+1,Date:s.dt,Montant:s.am,Note:s.note||'',Paiement:s.pm||''};}),'Salaires');
  if(S.bu&&S.bu.length)addSh(S.bu.map(function(b){return{Categorie:b.cat,'Budget/mois':b.al,'Depense':Math.round(b.sp||0),Restant:Math.round(b.al*12-(b.sp||0)),'%utilise':b.al>0?Math.round((b.sp||0)/(b.al*12)*100)+'%':'N/A'};}),'Budget');
  var iP=S.io.filter(function(i){return i.st==='payée';}).reduce(function(s,i){return s+i.am;},0)+S.tx.filter(function(t){return t.tp==='in';}).reduce(function(s,t){return s+t.am;},0);
  var eP=S.ii.filter(function(i){return i.ok;}).reduce(function(s,i){return s+i.am;},0)+S.tx.filter(function(t){return t.tp==='ex';}).reduce(function(s,t){return s+t.am;},0)+S.sal.reduce(function(s,x){return s+x.am;},0);
  var tC2=S.io.filter(function(i){return i.st==='payée';}).reduce(function(s,i){var r=i.tv||0;return s+(r>0?i.am-i.am/(1+r/100):0);},0);
  var tD2=S.ii.filter(function(i){return i.ok&&i.st==='payée';}).reduce(function(s,i){var r=i.tv||0;return s+(r>0?i.am-i.am/(1+r/100):0);},0);
  addSh([{Poste:'Revenus encaisses',Montant:Math.round(iP)},{Poste:'Charges totales',Montant:Math.round(eP)},{Poste:'Resultat net',Montant:Math.round(iP-eP)},{Poste:'Marge%',Montant:iP>0?Math.round((iP-eP)/iP*100):0},{Poste:'---'},{Poste:'TVA collectee',Montant:Math.round(tC2)},{Poste:'TVA deductible',Montant:Math.round(tD2)},{Poste:'TVA nette',Montant:Math.round(tC2-tD2)}],'Compte de resultat');
  XLSX.writeFile(wb,'ComptaAI_'+tod()+'.xlsx');
  toast('Export: '+(S.tx.length+S.io.length+S.ii.length+S.sal.length)+' lignes','ok');
}
function pgD(ct,acts){
  acts.innerHTML='<button class="btn bs" onclick="xlAll()">⬇ Excel</button>';
  var _p=window._dashP||'m',_cat=window._dashCat||null;

  // ── Calc totals ──────────────────────────────────────────
  var incTx=S.tx.filter(function(t){return t.tp==='in';}).reduce(function(s,t){return s+(parseFloat(t.am)||0);},0);
  var expTx=S.tx.filter(function(t){return t.tp==='ex';}).reduce(function(s,t){return s+(parseFloat(t.am)||0);},0);
  var incInv=S.io.filter(function(i){return i.st==='payée';}).reduce(function(s,i){return s+(parseFloat(i.am)||0);},0);
  var expInv=S.ii.filter(function(i){return i.ok;}).reduce(function(s,i){return s+(parseFloat(i.am)||0);},0);
  var salT=S.sal.reduce(function(s,x){return s+(parseFloat(x.am)||0);},0);
  var inc=incTx+incInv, exp=expTx+expInv+salT, prf=inc-exp;
  var mg=inc>0?Math.round(prf/inc*100):0;
  var ca=S.io.reduce(function(s,i){return s+(parseFloat(i.am)||0);},0);
  var pnd=S.io.filter(function(i){return i.st==='envoyée'||i.st==='en retard';}).reduce(function(s,i){return s+(parseFloat(i.am)||0);},0);
  var lt=S.io.filter(function(i){return i.st==='en retard';}).length;

  // ── TVA ──────────────────────────────────────────────────
  var tvc=S.io.filter(function(i){return i.st==='payée';}).reduce(function(s,i){var r=parseFloat(i.tv)||0;return s+(r>0?i.am-i.am/(1+r/100):0);},0);
  var tvd=S.ii.filter(function(i){return i.ok&&i.st==='payée';}).reduce(function(s,i){var r=parseFloat(i.tv)||0;return s+(r>0?i.am-i.am/(1+r/100):0);},0);
  var tvn=tvc-tvd;

  // ── Chart data ───────────────────────────────────────────
  var allSrc=[];
  S.tx.forEach(function(t){allSrc.push({dt:t.dt,am:parseFloat(t.am)||0,tp:t.tp==='in'?'r':'d',cat:t.cat,scat:t.scat||''});});
  S.io.filter(function(i){return i.st==='payée';}).forEach(function(i){allSrc.push({dt:i.dt,am:parseFloat(i.am)||0,tp:'r',cat:'Revenus',scat:'Facturation'});});
  S.ii.filter(function(i){return i.ok;}).forEach(function(i){allSrc.push({dt:i.dt,am:parseFloat(i.am)||0,tp:'d',cat:i.cat||'Autre',scat:i.scat||''});});
  S.sal.forEach(function(s){allSrc.push({dt:s.dt,am:parseFloat(s.am)||0,tp:'d',cat:'Salaire',scat:'Salaire dirigeant'});});

  // Build chart buckets by period
  var ML=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  var mn={};
  if(_p==='d'){
    var now=new Date();
    for(var i2=29;i2>=0;i2--){var dd=new Date(now);dd.setDate(dd.getDate()-i2);mn[dd.toISOString().split('T')[0]]={r:0,d:0};}
    allSrc.forEach(function(e){if(mn[e.dt]!==undefined){mn[e.dt][e.tp]+=e.am;}});
  }else if(_p==='a'){
    var cy=new Date().getFullYear();
    for(var y=cy-4;y<=cy;y++)mn[y]={r:0,d:0};
    allSrc.forEach(function(e){var yr=new Date(e.dt).getFullYear();if(mn[yr])mn[yr][e.tp]+=e.am;});
  }else{
    allSrc.forEach(function(e){var d=new Date(e.dt),k=ML[d.getMonth()]+(d.getFullYear()+'').slice(2);if(!mn[k])mn[k]={r:0,d:0};mn[k][e.tp]+=e.am;});
    var sortedKeys=Object.keys(mn).sort(function(a,b){var mi=ML.indexOf(a.slice(0,-2)),bi=ML.indexOf(b.slice(0,-2)),ay=parseInt(a.slice(-2)),by=parseInt(b.slice(-2));return ay!==by?ay-by:mi-bi;});
    var mn2={};sortedKeys.forEach(function(k){mn2[k]=mn[k];});mn=mn2;
  }
  var ml=Object.keys(mn),mr=ml.map(function(k){return mn[k].r;}),md2=ml.map(function(k){return mn[k].d;});

  // Pie data
  var pieData={},pieTitle='Dépenses par catégorie';
  if(_cat){
    pieTitle='▸ '+_cat;
    allSrc.filter(function(e){return e.tp==='d'&&e.cat===_cat;}).forEach(function(e){var k=e.scat||'Autre';pieData[k]=(pieData[k]||0)+e.am;});
  }else{
    allSrc.filter(function(e){return e.tp==='d';}).forEach(function(e){pieData[e.cat]=(pieData[e.cat]||0)+e.am;});
  }
  var cats=Object.entries(pieData).filter(function(x){return x[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  var ccs=cats.map(function(x){return catColor(_cat||x[0]);});

  // ── Build HTML ────────────────────────────────────────────
  var h='<div style="display:flex;justify-content:flex-end;gap:5px;margin-bottom:14px">';
  ['d','m','a'].forEach(function(p){
    h+='<button onclick="window._dashP=\''+p+'\';dC();pgD(document.getElementById(\'ct\'),document.getElementById(\'hacts\'))" class="btn bs'+(_p===p?' bp':'')+'">'+( p==='d'?'Journalier':p==='m'?'Mensuel':'Annuel')+'</button>';
  });
  h+='</div>';

  // KPI row 1
  h+='<div class="g4" style="margin-bottom:12px">';
  h+='<div class="sc"><div class="sl2">CA Facturé</div><div class="sv inf">'+fmt(ca)+'</div><div class="ss">'+S.io.length+' facture(s)</div></div>';
  h+='<div class="sc"><div class="sl2">Encaissé</div><div class="sv ok">'+fmt(inc)+'</div><div class="ss">Marge '+mg+'%</div></div>';
  h+='<div class="sc"><div class="sl2">Charges</div><div class="sv bad">'+fmt(exp)+'</div><div class="ss">dont sal. '+fmt(salT)+'</div></div>';
  h+='<div class="sc"><div class="sl2">Résultat net</div><div class="sv" style="color:var(--A)">'+fmt(prf)+'</div><div class="ss">'+(lt>0?'<span style="color:var(--bad)">'+lt+' retard(s)</span>':'À encaisser: '+fmt(pnd))+'</div></div>';
  h+='</div>';

  // TVA row
  h+='<div class="g3" style="margin-bottom:14px">';
  h+='<div class="sc"><div class="sl2">TVA collectée</div><div class="sv" style="color:var(--inf)">'+fmt(tvc)+'</div><div class="ss">Factures payées</div></div>';
  h+='<div class="sc"><div class="sl2">TVA déductible</div><div class="sv" style="color:var(--mt)">'+fmt(tvd)+'</div><div class="ss">Achats validés</div></div>';
  h+='<div class="sc"><div class="sl2">TVA nette</div><div class="sv '+(tvn>=0?'bad':'ok')+'">'+fmt(Math.abs(tvn))+'</div><div class="ss '+(tvn>=0?'bad':'ok')+'">'+(tvn>=0?'À reverser':'Crédit TVA')+'</div></div>';
  h+='</div>';

  // Charts
  h+='<div class="gchart" style="margin-bottom:14px">';
  h+='<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Évolution</div><canvas id="chM" height="80"></canvas></div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:13px;font-weight:600">'+pieTitle+'</span>'+(_cat?'<button onclick="window._dashCat=null;dC();pgD(document.getElementById(\'ct\'),document.getElementById(\'hacts\'))" class="btn bx">← Retour</button>':'')+'</div>';
  h+='<canvas id="chP" style="max-height:140px"></canvas>';
  h+='<div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">';
  cats.slice(0,6).forEach(function(x,i){
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;cursor:pointer" onclick="window._dashCat=\''+(_cat||x[0])+'\';dC();pgD(document.getElementById(\'ct\'),document.getElementById(\'hacts\'))"><span style="display:flex;align-items:center;gap:5px;color:var(--mt)"><span style="width:7px;height:7px;border-radius:50%;background:'+ccs[i]+';display:inline-block"></span>'+x[0]+'</span><span class="mono">'+fmt(x[1])+'</span></div>';
  });
  if(!_cat&&cats.length)h+='<div style="font-size:10px;color:var(--dm);margin-top:4px">Cliquez pour voir le détail →</div>';
  h+='</div></div></div>';

  // Recent data
  h+='<div class="g2">';
  // Last transactions
  h+='<div class="card" style="padding:0"><div style="padding:10px 14px;border-bottom:1px solid var(--br);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center">Dernières transactions<button class="btn bx" onclick="go(\'tx\')">Voir tout →</button></div><table class="tbl">';
  var rtx=[...S.tx].sort(function(a,b){return (b.dt||'').localeCompare(a.dt||'');}).slice(0,5);
  if(!rtx.length)h+='<tr><td colspan="2" style="text-align:center;color:var(--mt);padding:14px">Aucune transaction manuelle</td></tr>';
  rtx.forEach(function(t){h+='<tr><td><div>'+t.dc+'</div><div style="font-size:11px;color:var(--mt)">'+t.cat+(t.scat?' › '+t.scat:'')+'<span style="margin-left:6px">'+fd(t.dt)+'</span></div></td><td style="text-align:right;color:'+(t.tp==='in'?'var(--ok)':'var(--bad)')+'" class="mono">'+(t.tp==='in'?'+':'-')+fmt(t.am)+'</td></tr>';});
  h+='</table></div>';
  // Recent invoices
  h+='<div class="card" style="padding:0"><div style="padding:10px 14px;border-bottom:1px solid var(--br);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center">Factures récentes<button class="btn bx" onclick="go(\'io\')">Voir tout →</button></div><table class="tbl">';
  var rio=[...S.io].sort(function(a,b){return (b.dt||'').localeCompare(a.dt||'');}).slice(0,4);
  if(!rio.length)h+='<tr><td colspan="2" style="text-align:center;color:var(--mt);padding:14px">Aucune facture</td></tr>';
  rio.forEach(function(i){h+='<tr><td><div>'+i.cl+'</div><div style="font-size:11px;color:var(--mt)">'+i.id+'</div></td><td style="text-align:right"><div class="mono">'+fmt(i.am)+'</div>'+bdg(i.st)+'</td></tr>';});
  h+='</table></div>';
  h+='</div>';

  ct.innerHTML=h;

  // Render charts
  setTimeout(function(){
    var cM2=document.getElementById('chM');
    if(cM2){
      if(CH.m){CH.m.destroy();delete CH.m;}
      CH.m=new Chart(cM2,{type:'bar',data:{labels:ml,datasets:[{label:'Revenus',data:mr,backgroundColor:'rgba(16,185,129,.65)',borderRadius:3},{label:'Dépenses',data:md2,backgroundColor:'rgba(239,68,68,.65)',borderRadius:3}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45,callback:function(v,i2){return _p==='d'&&ml.length>14?(i2%7===0?ml[i2]:''):ml[i2];}}},y:{grid:{color:'rgba(128,128,128,.07)'},ticks:{font:{size:10},callback:function(v){return v>=1000?(v/1000).toFixed(0)+'k':v;}}}}}});
    }
    var cP=document.getElementById('chP');
    if(cP&&cats.length){
      if(CH.p){CH.p.destroy();delete CH.p;}
      CH.p=new Chart(cP,{type:'doughnut',data:{labels:cats.map(function(x){return x[0];}),datasets:[{data:cats.map(function(x){return x[1];}),backgroundColor:ccs,borderWidth:0}]},options:{responsive:true,cutout:'60%',plugins:{legend:{display:false}},onClick:function(e,el){if(el.length&&!_cat){window._dashCat=cats[el[0].index][0];dC();pgD(document.getElementById('ct'),document.getElementById('hacts'));}}}});
    }
  },80);
}

var _txFl='all';
function renderTX(container,fl){
  var ct=container||window._pgTXct||document.getElementById('ct');
  fl=fl||_txFl||'all';
  function _body(){
    // Combine manual tx + invoice lines
    var vis=[];
    S.tx.forEach(function(t){if(fl==='all'||fl===t.tp)vis.push({...t,src:'tx'});});
    if(fl==='all'||fl==='in')S.io.filter(function(i){return i.st==='payée';}).forEach(function(i){vis.push({id:'io_'+i.id,tp:'in',dt:i.dt,dc:'[Facture] '+i.cl,cat:'Revenus',scat:'Facturation',am:i.am,tv:i.tv||0,pm:'',src:'inv'});});
    if(fl==='all'||fl==='ex')S.ii.filter(function(i){return i.ok;}).forEach(function(i){vis.push({id:'ii_'+i.id,tp:'ex',dt:i.dt,dc:'[Achat] '+i.sp,cat:i.cat||'Autre',scat:i.scat||'',am:i.am,tv:i.tv||0,pm:i.pm||'',src:'inv'});});
    if((fl==='all'||fl==='ex')&&S.sal.length)S.sal.forEach(function(s){vis.push({id:'sal_'+s.id,tp:'ex',dt:s.dt,dc:'💰 Salaire dirigeant',cat:'Salaire',scat:'Salaire dirigeant',am:s.am,tv:0,pm:s.pm||'',src:'sal'});});
    vis.sort(function(a,b){return a.dt.localeCompare(b.dt);});
    var h='<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
    ['all','in','ex'].forEach(function(f){h+='<button onclick="window._txfl(\''+f+'\')" class="btn bs'+(fl===f?' bp':'')+'">'+( f==='all'?'Tout':f==='in'?'Revenus':'Dépenses')+'</button>';});
    h+='<span style="font-size:11px;color:var(--mt);margin-left:4px">Italique = depuis factures</span></div>';
    h+='<div class="card" style="padding:0">';
    if(!vis.length){h+='<div class="empty">Aucune transaction</div>';}
    else{
      h+='<div class="tbl-wrap"><table class="tbl" style="min-width:560px"><thead><tr><th>Date ↑</th><th>Description</th><th>Catégorie</th><th>TVA</th><th>Paiement</th><th style="text-align:right">Montant</th><th></th></tr></thead><tbody>';
      vis.forEach(function(t){
        var inv=t.src!=='tx';
        h+='<tr style="'+(inv?'opacity:.8;font-style:italic':'')+'">';
        h+='<td style="color:var(--mt);white-space:nowrap;font-style:normal">'+fd(t.dt)+'</td>';
        h+='<td><span style="width:6px;height:6px;border-radius:50%;background:'+(t.tp==='in'?'var(--ok)':'var(--bad)')+';display:inline-block;margin-right:6px"></span>'+t.dc+'</td>';
        h+='<td style="color:var(--mt);font-size:12px">'+t.cat+(t.scat?' › '+t.scat:'')+'</td>';
        h+='<td style="color:var(--mt)">'+(t.tv||0)+'%</td>';
        h+='<td style="color:var(--mt);font-size:11px">'+(t.pm||'—')+'</td>';
        h+='<td style="text-align:right;color:'+(t.tp==='in'?'var(--ok)':'var(--bad)')+';font-weight:500" class="mono">'+(t.tp==='in'?'+':'−')+fmt(t.am)+'</td>';
        h+='<td>'+(inv?'<span style="font-size:10px;color:var(--dm)">auto</span>':(t.src==='sal'?'<button onclick="delSal(\''+t.id.replace('sal_','')+'\')" class="btn bx bbad">×</button>':'<button onclick="delTx(\''+t.id+'\')" class="btn bx bbad">×</button>'))+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }
    h+='</div>';
    ct.innerHTML=h;
  }
  window._txfl=function(f){_txFl=f;renderTX(null,f);};_body();
}
function pgTX(ct,acts){
  window._pgTXct=ct;_txFl='all';
  acts.innerHTML='<button class="btn bs" onclick="xlAll()">⬇ Excel</button><button class="btn bs" onclick="mSal()">💰 Salaire</button><button class="btn bs bp" onclick="mTx()">+ Ajouter</button>';
  renderTX(ct,'all');
}
window.delTx=function(id){if(!confirm('Supprimer cette transaction ?'))return;var t=S.tx.find(function(x){return String(x.id)===String(id);});if(!S.audit)S.audit=[];if(t)S.audit.unshift({ts:new Date().toISOString(),action:'delete_tx',id:String(id),dc:t.dc||'',am:t.am});S.tx=S.tx.filter(function(t2){return String(t2.id)!==String(id);});sv();if(window.renderTX)renderTX();else go('tx');toast('Transaction supprimée','ok');};
window.delSal=function(id){if(!confirm('Supprimer ?'))return;S.sal=S.sal.filter(function(s){return String(s.id)!==String(id);});sv();if(window.renderTX)renderTX();else go('tx');};
window.mTx=function(){
  md('<div class="modal"><div class="mh">Nouvelle transaction</div>'
    +'<div class="fgr">'
    +'<div class="fg"><label class="lbl">Type</label><select id="at-t" class="inp" onchange="updTxCats()"><option value="in">Revenu</option><option value="ex">Dépense</option></select></div>'
    +'<div class="fg"><label class="lbl">Catégorie</label>'+catSelect('at-c','Autre','updTxSub()')+'</div>'
    +'<div class="fg"><label class="lbl">Sous-catégorie</label>'+subCatSelect('at-sc','Autre','')+'</div>'
    +'<div class="fg"><label class="lbl">Mode paiement</label><select id="at-pm" class="inp">'+PAY_METHODS.map(function(p){return '<option>'+p+'</option>';}).join('')+'</select></div>'
    +'<div class="fg sp2"><label class="lbl">Description</label><input id="at-d" class="inp" placeholder="Description"></div>'
    +'<div class="fg"><label class="lbl">Montant</label><input id="at-a" type="number" class="inp" placeholder="0"></div>'
    +'<div class="fg"><label class="lbl">Date</label><input id="at-dt" type="date" class="inp" value="'+tod()+'"></div>'
    +'<div class="fg"><label class="lbl">TVA (%)</label><input id="at-v" type="number" class="inp" value="0"></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px"><button class="btn" onclick="cM()">Annuler</button><button class="btn bp" onclick="savTx()">Enregistrer</button></div>'
    +'</div>');
};
window.updTxSub=function(){var c=document.getElementById('at-c')?.value;var el=document.getElementById('at-sc');if(el&&c)el.innerHTML=getSubCats(c).map(function(s){return '<option>'+s+'</option>';}).join('');};
window.savTx=function(){
  var d=document.getElementById('at-d').value,a=parseFloat(document.getElementById('at-a').value)||0;

function invHtml(i,co){

  h+='</div></td>';
  h+='<td style="padding:16px;vertical-align:top;border-bottom:1px solid '+B+'">';
  h+='<div style="font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:'+A+'">FACTURE</div>';
  h+='<div style="font-size:11.5px;text-transform:uppercase;line-height:2;color:#333;margin-top:10px">';
  h+='<div><strong>Numéro :</strong> '+i.id+'</div><div><strong>Date d\'édition :</strong> '+fd(i.dt)+'</div><div><strong>Date d\'échéance :</strong> '+fd(i.du)+'</div>';
  if(cu!=='MAD')h+='<div><strong>Devise :</strong> '+cu+'</div>';
  h+='</div></td></tr>';
  h+='<tr><td style="padding:14px 16px;border-right:1px solid '+B+'">';
  h+='<div style="font-size:11px;color:#888;text-transform:uppercase;margin-bottom:5px">Facturé à</div>';
  h+='<div style="font-size:12px;font-weight:700;text-transform:uppercase;line-height:1.9;color:#333">';
  h+=i.cl;if(cli.ad)h+='<br>'+cli.ad;if(i.em)h+='<br>'+i.em;if(i.cice)h+='<br>ICE : '+i.cice;else if(cli.ic)h+='<br>ICE : '+cli.ic;if(i.crc)h+='<br>RC : '+i.crc;else if(cli.rc)h+='<br>RC : '+cli.rc;
  h+='</div></td><td style="background:'+G+'"></td></tr></table>';
  h+='<table style="width:100%;border-collapse:collapse;margin-top:18px;font-size:11.5px">';
  h+='<thead><tr style="background:'+A+';color:#fff;text-transform:uppercase;letter-spacing:.04em">';
  ['Description','Qté','Prix unitaire HT','TVA %','Montant HT','Total TTC'].forEach(function(hh,i){h+='<th style="padding:9px '+(i===0?'10px':'7px')+';text-align:'+(i===0?'left':'right')+'">'+hh+'</th>';});
  h+='</tr></thead><tbody>';
  rows.forEach(function(x,idx){var bg=idx%2===0?'#fff':G;h+='<tr style="background:'+bg+';border-bottom:1px solid '+B+'"><td style="padding:9px 10px">'+x.d+'</td><td style="padding:9px 7px;text-align:right">'+x.q+'</td><td style="padding:9px 7px;text-align:right">'+fmtN(x.p)+'</td><td style="padding:9px 7px;text-align:center">'+x.tv+'%</td><td style="padding:9px 7px;text-align:right">'+fmtN(x.ht)+'</td><td style="padding:9px 10px;text-align:right;font-weight:600">'+fmtN(x.ttc)+'</td></tr>';});
  h+='</tbody></table>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:12px">';
  h+='<tr><td style="background:'+G+';padding:8px"></td><td style="padding:8px 12px;background:'+G+';border-left:1px solid '+B+';border-top:2px solid '+B+'">';
  h+='<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="color:#555;text-transform:uppercase;font-weight:600">Total HT :</span><span class="mono">'+fmtN(tHT)+' '+cu+'</span></div>';

  h+='</td></tr></table>';

    var h='<div class="card" style="padding:0"><div class="tbl-wrap"><table class="tbl" style="min-width:680px"><thead><tr><th>Date ↑</th><th>N°</th><th>Client</th><th>Échéance</th><th>Devise</th><th style="text-align:right">TTC</th><th>Statut</th><th>Actions</th></tr></thead><tbody>';

        h+='<td style="font-weight:500">'+i.cl+'</td>';
        h+='<td style="color:'+(i.st==='en retard'?'var(--bad)':'var(--mt)')+';white-space:nowrap">'+fd(i.du)+'</td>';
        h+='<td style="color:var(--mt);font-size:11px">'+(i.cu||S.co.cu||'MAD')+'</td>';
        h+='<td style="text-align:right;font-weight:500" class="mono">'+fmt(i.am,i.cu)+'</td>';
        h+='<td>'+bdg(i.st)+'</td>';
        h+='<td><div style="display:flex;gap:3px">';
        h+='<button onclick="vInv(\''+i.id+'\')" class="btn bx" title="Aperçu">👁</button>';
        h+='<button onclick="eInv(\''+i.id+'\')" class="btn bx" title="Modifier">✏</button>';
        h+='<button onclick="eSt(\''+i.id+'\')" class="btn bx" title="Statut">⬆</button>';
        h+='<button onclick="mvIOtoII(\''+i.id+'\')" class="btn bx" title="Déplacer vers Factures Reçues">⬇</button>';
        h+='<button onclick="prInv(\''+i.id+'\')" class="btn bx" title="Imprimer">🖨</button>';
        h+='<button onclick="dIO(\''+i.id+'\')" class="btn bx bbad">×</button>';
        h+='</div></td></tr>';
      });
      h+='</tbody></table></div></div>';
    }
  ct.innerHTML=h;
}
window.autoFillCat=function(sp){
  if(!sp||!S.catMemo)return;
  var key=sp.toLowerCase().trim();
  var memo=S.catMemo[key];
  if(!memo) {
    // Fuzzy: check if sp contains a known key
    Object.keys(S.catMemo).forEach(function(k){if(key.includes(k)||k.includes(key))memo=S.catMemo[k];});
  }
  if(memo){
    var catEl=document.getElementById('vi-cat');
    var scatEl=document.getElementById('vi-scat');
    if(catEl){catEl.value=memo.cat;}
    if(scatEl&&memo.scat){
      // Rebuild subcats
      var subs=getSubCats(memo.cat);
      scatEl.innerHTML=subs.map(function(s){return '<option'+(s===memo.scat?' selected':'')+'>'+s+'</option>';}).join('');
    }
    toast('Catégorie auto: '+memo.cat,'i');
  }
};
window.mvIOtoII=function(id){
  var i=S.io.find(function(x){return x.id===id;});
  if(!i||!confirm('Transférer cette facture vers "Factures reçues" ?'))return;
  S.io=S.io.filter(function(x){return x.id!==id;});
  S.ii.push({id:i.id,sp:i.cl,itype:'achat',cat:'Autre',scat:'',dt:i.dt,du:i.du||'',am:i.am,tv:i.tv,cu:i.cu,pm:'',st:'en attente',ok:false,it:i.it||[],pdfB64:i.pdfB64||null});
  if(!S.audit)S.audit=[];
  S.audit.unshift({ts:new Date().toISOString(),action:'move_io_to_ii',id:i.id,cl:i.cl,am:i.am});
  sv();rfDash();renderIO();renderII();
  toast('Facture déplacée vers Factures Reçues','ok');
};
window.dIO=function(id){if(!confirm('Supprimer cette facture ?'))return;var inv=S.io.find(function(x){return x.id===id;});if(!S.audit)S.audit=[];if(inv)S.audit.unshift({ts:new Date().toISOString(),action:'delete_io',id:id,cl:inv.cl,am:inv.am});S.io=S.io.filter(function(i){return i.id!==id;});sv();rfDash();if(window.renderIO)renderIO();else go('io');toast('Facture supprimée','ok');};

window.savNI=function(){

window.svValII=function(id){
  var i=S.ii.find(function(x){return x.id===id;});if(!i)return;
  var newType=document.getElementById('vi-itype').value;
  i.sp=document.getElementById('vi-sp').value;
  i.id=document.getElementById('vi-id').value;
  i.itype=newType;
  i.dt=document.getElementById('vi-dt').value;
  i.du=document.getElementById('vi-du')?.value||'';
  i.am=parseFloat(document.getElementById('vi-am').value)||0;
  i.tv=parseFloat(document.getElementById('vi-tv').value)||0;
  i.cu=document.getElementById('vi-cu').value;
  i.cat=document.getElementById('vi-cat').value;
  i.scat=document.getElementById('vi-scat')?.value||'';
  i.pm=document.getElementById('vi-pm').value;
  i.st=document.getElementById('vi-st').value;
  i.ok=true;
  // TVA coherence alert
  var stdTv=S.co.tr||20;
  if(i.tv>0&&Math.abs(i.tv-stdTv)>5)toast('⚠ TVA '+i.tv+'% écart vs taux standard '+stdTv+'%','w');
  // Auto-memorize category for this supplier
  if(i.sp&&i.cat&&i.cat!=='Autre'){
    if(!S.catMemo)S.catMemo={};
    S.catMemo[i.sp.toLowerCase().trim()]={cat:i.cat,scat:i.scat||''};
  }
  // Audit log
  if(!S.audit)S.audit=[];
  S.audit.unshift({ts:new Date().toISOString(),action:'validate_ii',id:i.id,sp:i.sp,am:i.am,itype:newType});
  if(S.audit.length>200)S.audit=S.audit.slice(0,200);
  // If type changed to vente → transfer to S.io (factures émises)
  if(newType==='vente'){
    S.ii=S.ii.filter(function(x){return x.id!==id;});
    S.io.push({id:i.id,cl:i.sp,em:'',am:i.am,dt:i.dt,du:i.du||'',st:'envoyée',tv:i.tv,cu:i.cu,it:i.it||[],pdfB64:i.pdfB64||null});
    sv();cM();rfDash();
    if(window.renderIO)renderIO();
    if(window.renderII)renderII();
    toast('Facture transférée vers Factures Émises ✓','ok');
    return;
  }
  sv();cM();rfDash();renderII();toast('Facture validée !','ok');
};

window.procBank=async function(inp){
  var f=inp.files[0];if(!f)return;
  var el=document.getElementById('bankres');
  el.innerHTML='<div class="al ai">Lecture du fichier…</div>';
  var reader=new FileReader();
  reader.onload=async function(){
    var content;
    if(f.name.endsWith('.pdf')){
      var b64=reader.result.split(',')[1];
      await runBankAI([{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:buildBankPrompt()}]);
    }else{
      document.getElementById('banktxt').value=reader.result;
      analyzeBank();
    }
  };
  if(f.name.endsWith('.pdf'))reader.readAsDataURL(f);else reader.readAsText(f,'UTF-8');
};

  s.onload=function(){_initGDrive();};
  s.onerror=function(){if(st)st.innerHTML='<span style="color:var(--bad)">Erreur chargement SDK Google.</span>';};
  document.head.appendChild(s);

window._initGDrive=function(){
  var st=document.getElementById('dv-st');if(st)st.textContent='Ouverture Google…';
  try{
    var client=google.accounts.oauth2.initTokenClient({client_id:S.dv.cid,scope:'https://www.googleapis.com/auth/drive',callback:function(resp){
      if(resp.error){if(st)st.innerHTML='<span style="color:var(--bad)">Erreur: '+resp.error+'</span>';return;}
      S.dv.tk=resp.access_token;S.dv.on=true;S.dv.tkExp=Date.now()+(resp.expires_in||3600)*1000;
      fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}}).then(function(r){return r.json();}).then(function(u){S.dv.em=u.email||'';sv();go('dr');toast('✓ Drive connecté: '+S.dv.em,'ok');loadDriveDB();}).catch(function(){sv();go('dr');toast('✓ Drive connecté','ok');loadDriveDB();});
    }});
    client.requestAccessToken({prompt:'consent'});
  }catch(e){if(st)st.innerHTML='<span style="color:var(--bad)">'+e.message+'</span>';}
};

window.syncDrive=async function(){
  var log=document.getElementById('dvlog');
  if(!S.dv.src){toast('Configurez le dossier source','bad');return;}
  if(!S.dv.tk){toast('Connectez Drive d\'abord','bad');return;}
  if(log)log.innerHTML='<div class="al ai">Recherche récursive de PDFs…</div>';
  try{
    var hdr={'Authorization':'Bearer '+S.dv.tk};
    var knownDriveIds=new Set(
      S.ii.filter(function(i){return i.driveId;}).map(function(i){return i.driveId;}).concat(
      S.io.filter(function(i){return i.driveId;}).map(function(i){return i.driveId;}))
    );
    async function scanFolder(fid,depth,path){
      if(depth>6)return[];
      var all=[];
      var r1=await fetch('https://www.googleapis.com/drive/v3/files?q=\''+fid+'\'+in+parents+and+mimeType%3D\'application%2Fpdf\'+and+trashed%3Dfalse&fields=files(id,name)&pageSize=100',{headers:hdr});
      var d1=await r1.json();
      if(d1.files)d1.files.forEach(function(f){if(!knownDriveIds.has(f.id))all.push({id:f.id,name:f.name,srcFid:fid,folderPath:path});});
      var r2=await fetch('https://www.googleapis.com/drive/v3/files?q=\''+fid+'\'+in+parents+and+mimeType%3D\'application%2Fvnd.google-apps.folder\'+and+trashed%3Dfalse&fields=files(id,name)&pageSize=50',{headers:hdr});
      var d2=await r2.json();
      if(d2.files){for(var k=0;k<d2.files.length;k++){var sub=await scanFolder(d2.files[k].id,depth+1,(path?path+'/':'')+d2.files[k].name);all=all.concat(sub);}}
      return all;
    }
    var newFiles=await scanFolder(S.dv.src,0,'');
    if(!newFiles.length){if(log)log.innerHTML='<div class="al ao">Aucun nouveau PDF (doublons ignorés).</div>';return;}
    if(log)log.innerHTML='<div class="al ai">'+newFiles.length+' nouveau(x) PDF(s). Analyse IA…</div>';
    var okIO=0,okII=0,errs=0;
    for(var fi=0;fi<newFiles.length;fi++){
      var f=newFiles[fi];
      try{
        var resp=await fetch('https://www.googleapis.com/drive/v3/files/'+f.id+'?alt=media',{headers:hdr});
        var blob=await resp.blob();
        var b64=await new Promise(function(res){var rd=new FileReader();rd.onload=function(){res(rd.result.split(',')[1]);};rd.readAsDataURL(blob);});
        var b64url=await new Promise(function(res){var rd=new FileReader();rd.onload=function(){res(rd.result);};rd.readAsDataURL(blob);});
        var xSp=f.name.replace(/\.pdf$/i,''),xDt=tod(),xAm=0,xTv=20,xCat='Autre',xScat='',xCu='MAD',xDir='recue',xType='achat';

            if(x.dir)xDir=x.dir;

            if(x.date)xDt=x.date; // Note: x.num ignored, using sequential
            if(x.ttc)xAm=x.ttc;else if(x.ht)xAm=x.ht*(1+(x.tvaPct||20)/100);
            xTv=normTVA(x.tvaPct,xAm);
            if(x.cat)xCat=x.cat;if(x.scat)xScat=x.scat;if(x.cu)xCu=x.cu;

        var xId;

        else{xId='REC-'+new Date(xDt).getFullYear()+'-'+String(S.nII).padStart(3,'0');S.nII++;}
        if(xDir==='emise'){
          S.io.push({id:xId,cl:xSp,em:'',am:xAm,dt:xDt,du:'',st:'envoyée',tv:xTv,cu:xCu,it:[],driveId:f.id,folderPath:f.folderPath,pdfB64:b64url});
          okIO++;

          okII++;
        }
        if(S.dv.dst){

            for(var pi=0;pi<parts.length;pi++){
              var sr=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D\''+encodeURIComponent(parts[pi])+'\'+and+\''+destFid+'\'+in+parents+and+mimeType%3D\'application%2Fvnd.google-apps.folder\'+and+trashed%3Dfalse&fields=files(id)&pageSize=1',{headers:hdr});
              var sd=await sr.json();
              if(sd.files&&sd.files.length){destFid=sd.files[0].id;}
              else{var cr=await fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{...hdr,'Content-Type':'application/json'},body:JSON.stringify({name:parts[pi],mimeType:'application/vnd.google-apps.folder',parents:[destFid]})});var cd=await cr.json();if(cd.id)destFid=cd.id;}
            }
          }
          var nm2=(xDir==='emise'?'EMISE':'RECUE')+'_'+xId+'_'+(xSp||'').replace(/[^\w]/g,'_').slice(0,25)+'_'+xDt+'.pdf';
          await fetch('https://www.googleapis.com/drive/v3/files/'+f.id+'/copy?fields=id',{method:'POST',headers:{...hdr,'Content-Type':'application/json'},body:JSON.stringify({name:nm2,parents:[destFid]})});
        }
        if(log)log.innerHTML='<div class="al ai">'+(fi+1)+'/'+newFiles.length+' ('+okIO+' émises, '+okII+' reçues)…</div>';
      }catch(fe){errs++;console.error('Import err',fe);}
    }
    S.dv.ls=tod();
    // Refresh UI immediately
    if(window.renderII)try{renderII();}catch(e){}
    if(window.renderIO)try{renderIO();}catch(e){}
    // Save immediately (strip pdfB64 to avoid localStorage quota crash)
    try{
      var _slim2=JSON.parse(JSON.stringify(S));
      _slim2.ii=_slim2.ii.map(function(i){return Object.assign({},i,{pdfB64:null});});
      _slim2.io=_slim2.io.map(function(i){return Object.assign({},i,{pdfB64:null});});
      localStorage.setItem(SK,JSON.stringify(_slim2));
    }catch(e){console.error('Post-sync save failed:',e);}
    rfDash();
    var msg='<div class="al ao" style="padding:14px"><strong>Import terminé !</strong><br>';
    if(okII)msg+='• '+okII+' facture(s) reçue(s)<br>';
    if(okIO)msg+='• '+okIO+' facture(s) émise(s)<br>';
    if(errs)msg+='• ⚠ '+errs+' erreur(s)<br>';
    msg+='<em style="font-size:11px;opacity:.7">Originaux Drive conservés.</em><br>';
    msg+='<div style="display:flex;gap:8px;margin-top:9px">';
    if(okII)msg+='<button onclick="go(\'ii\')" class="btn bok" style="flex:1;padding:9px">Factures reçues</button>';
    if(okIO)msg+='<button onclick="go(\'io\')" class="btn bp" style="flex:1;padding:9px">Factures émises</button>';
    msg+='</div></div>';
    if(log)log.innerHTML=msg;
  }catch(e){
    if(log)log.innerHTML='<div class="al ab">Erreur: '+e.message+'</div>';
    console.error('syncDrive:',e);
  }
};

// Try to recover data from previous localStorage keys (cai, cai2, cai3, cai4, cai5)
(function(){
  if(S.io.length||S.ii.length||S.tx.length)return; // already have data
  var oldKeys=['cai','cai2','cai3','cai4','cai5','cai_data'];
  for(var i=0;i<oldKeys.length;i++){
    var raw=localStorage.getItem(oldKeys[i]);
    if(raw&&oldKeys[i]!==SK){
      try{
        var old=JSON.parse(raw);
        if(old&&(old.io||old.ii||old.tx)){
          // Found old data!
          if(old.io&&old.io.length)S.io=old.io;
          if(old.ii&&old.ii.length)S.ii=old.ii;
          if(old.tx&&old.tx.length)S.tx=old.tx;
          if(old.cl&&old.cl.length)S.cl=old.cl;
          if(old.qo&&old.qo.length)S.qo=old.qo;
          if(old.bu&&old.bu.length)S.bu=old.bu;
          if(old.sal&&old.sal.length)S.sal=old.sal;
          if(old.co)Object.assign(S.co,old.co);
          if(old.nI)S.nI=old.nI;
          if(old.nC)S.nC=old.nC;
          if(old.nQ)S.nQ=old.nQ;
